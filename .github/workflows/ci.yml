name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest cryptography pillow numpy
      - run: |
          if [ -d tests ]; then PYTHONPATH=src pytest -q; else python -m compileall -q src; fi
